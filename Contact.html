<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <div class="container">
        <header>
            <a href="#" class="logo">portfolio.</a>
            <nav class="navbar">
                <a href="Index.html">Home</a>
                <a href="About.html">About</a>
                <a href="Skills.html">Skills</a>
                <a href="Project.html">Project</a>
                <a href="Contact.html" class="active">Contact</a>
            </nav>
        </header>

        <section class="contact-page">
            <div class="page-heading">
                <h1>Contact Me</h1>
            </div>

            <form action="#" class="contact-form">
                <div class="input-box">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <input type="password" placeholder="Password" required>
                <textarea name="message" id="message" cols="30" rows="6" placeholder="Your Message" required></textarea>
                <div class="form-actions">
                    <input type="submit" value="Send Message" class="btn">
                    <div class="contact-social">
                        <a href="#https://github.com/mudasirabbas7205/Internship-Code-Alpha.git"><i
                                class="bi bi-github"></i></a>
                        <a href="#"><i class="bi bi-twitter"></i></a>
                        <a href="#"><i class="bi bi-whatsapp"></i></a>
                        <a href="#https://www.linkedin.com/in/mudasir-abbas-a800a031a?utm_
                                 source=share_via&utm_content=profile&utm_medium=member_android"><i
                                class="bi bi-linkedin"></i></a>
                    </div>
                </div>
            </form>
        </section>

    </div>
</body>

</html>
